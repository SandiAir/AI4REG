{% extends "base.html" %}
{% block title %}ngdai - Netzbetreiber{% endblock %}
{% block content %}
<h1>Netzbetreiber</h1>

<div class="grid">
    <input type="search" id="entity-search" name="search"
           placeholder="Netzbetreiber suchen..."
           hx-get="/api/v1/entities"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#entity-table"
           hx-include="[name='sector']">
    <select name="sector"
            hx-get="/api/v1/entities"
            hx-trigger="change"
            hx-target="#entity-table"
            hx-include="[name='search']">
        <option value="">Alle Sektoren</option>
        <option value="strom">Strom</option>
        <option value="gas">Gas</option>
    </select>
</div>

<div id="entity-table" hx-get="/api/v1/entities" hx-trigger="load" hx-swap="innerHTML">
    <p>Lade Netzbetreiber...</p>
</div>
{% endblock %}
