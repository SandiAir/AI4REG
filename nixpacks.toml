[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
onlyIncludeFiles = ["pyproject.toml", "README.md", "src"]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install ."]

[start]
cmd = ". /opt/venv/bin/activate && python -m uvicorn ngdai.api.app:app --host 0.0.0.0 --port ${PORT:-8000}"
